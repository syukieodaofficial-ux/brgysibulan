<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CpE Admin Dashboard - System Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --cpe-primary: #0d6efd; /* Bootstrap Blue */
            --cpe-dark: #084298;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
        
        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            background: linear-gradient(180deg, var(--cpe-dark) 0%, var(--cpe-primary) 100%);
            color: white;
            padding-top: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-brand {
            text-align: center;
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        
        .sidebar-menu a {
            display: block;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 15px 30px;
            transition: 0.3s;
            border-left: 5px solid transparent;
        }
        
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background-color: rgba(255,255,255,0.1);
            color: white;
            border-left-color: #fff;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            background: white;
            padding: 25px;
            margin-bottom: 25px;
        }

        .badge-role-admin { background-color: #dc3545; }
        .badge-role-staff { background-color: #0d6efd; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            CpE ADMIN<br>
            <small style="font-size: 0.6em; font-weight: 300; opacity: 0.8;">SYSTEM CONTROL</small>
        </div>
        <div class="sidebar-menu">
            <a href="#" class="active" onclick="switchView('dashboard', this)">Dashboard Overview</a>
            <a href="#" onclick="switchView('users', this)">User Management</a>
            <a href="#" id="logoutBtn" style="margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1);">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Dashboard Overview -->
        <div id="dashboard-view">
            <h2 class="fw-bold text-dark mb-4">System Overview</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="card-custom text-center">
                        <h1 class="display-4 fw-bold text-primary" id="totalUsers">0</h1>
                        <p class="text-muted">Total Registered Users</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card-custom text-center">
                        <h1 class="display-4 fw-bold text-success">Active</h1>
                        <p class="text-muted">System Status</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- User Management -->
        <div id="users-view" style="display: none;">
            <h2 class="fw-bold text-dark mb-4">User Management</h2>
            <div class="card-custom">
                <h5 class="mb-4">Registered Accounts</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Password</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Users loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="database.js"></script>
    <script>
        // 1. Security Check
        if (!sessionStorage.getItem('isLoggedIn') || sessionStorage.getItem('userRole') !== 'cpe-admin') {
            window.location.href = 'cpe-login.html';
        }

        // 2. Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.clear();
            window.location.href = 'cpe-login.html';
        });

        // 3. View Switching
        window.switchView = function(viewName, link) {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('users-view').style.display = 'none';
            
            document.getElementById(viewName + '-view').style.display = 'block';
            
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            link.classList.add('active');

            if(viewName === 'users' || viewName === 'dashboard') {
                loadUsers();
            }
        };

        // 4. User Management Logic
        async function loadUsers() {
            const users = await db.getAllUsers();
            const currentUser = sessionStorage.getItem('currentUser');
            const tbody = document.getElementById('usersTableBody');
            
            tbody.innerHTML = '';
            document.getElementById('totalUsers').innerText = users.length;

            users.forEach((u, index) => {
                const isMe = u.username === currentUser;
                const deleteBtn = `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.username}')">Delete</button>`;
                
                const roleBadge = u.role === 'cpe-admin' ? '<span class="badge badge-role-admin">CpE Admin</span>' : '<span class="badge badge-role-staff">Staff</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${u.username} ${isMe ? '(You)' : ''}</td>
                        <td>${roleBadge}</td>
                        <td><button class="btn btn-sm btn-outline-primary" onclick="changePassword('${u.username}')">Change Pass</button></td>
                        <td>
                            ${deleteBtn}
                            <button class="btn btn-sm btn-dark" onclick="toggleRole('${u.username}')">Toggle Role</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Global Functions for Onclick
        window.deleteUser = async function(username) {
            if(confirm('Are you sure you want to delete user: ' + username + '?')) {
                await db.deleteUser(username);
                loadUsers();
            }
        };

        window.changePassword = async function(username) {
            const p = prompt("Enter new password (8-13 characters):");
            if(p) {
                if(p.length < 8 || p.length > 13) {
                    alert('Password must be between 8 and 13 characters.');
                    return;
                }
                await db.updatePassword(username, p);
                alert('Password updated successfully.');
                loadUsers();
            }
        };

        window.toggleRole = async function(username) {
            await db.toggleRole(username);
            loadUsers();
        };

        // Initial Load
        loadUsers();
    </script>
</body>
</html>
