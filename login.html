<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Barangay Sibulan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            background: linear-gradient(rgba(0, 100, 0, 0.5), rgba(0, 100, 0, 0.5)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuTK34t1qtwwqcbjnlGwLFFOhunOG2eXoe4A&s');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: #006400;">Admin Login</h3>
            <small class="text-muted">Barangay Sibulan Portal</small>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Login</button>
            <div class="mt-3 text-center">
                <small class="d-block mb-2">Don't have an account? <a href="register.html" class="text-decoration-none">Register</a></small>
                                <a href="index.html" class="text-muted text-decoration-none">Back to Website</a>
            </div>
        </form>
    </div>

    <script src="database.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const result = await db.login(user, pass);

            if(result.success) {
                const validUser = result.user;
                // Restrict CpE Admins from this login page
                if (validUser.role === 'cpe-admin') {
                    alert('Please use the CpE Admin Portal to login.');
                    window.location.href = 'cpe-login.html';
                    return;
                }

                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', validUser.role || 'staff');
                sessionStorage.setItem('currentUser', validUser.username);
                window.location.href = 'admin-portal.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
