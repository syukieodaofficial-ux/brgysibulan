<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CpE Admin Login - System Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            /* Blue gradient for CpE distinction */
            background: linear-gradient(rgba(0, 0, 100, 0.7), rgba(0, 0, 100, 0.7)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuTK34t1qtwwqcbjnlGwLFFOhunOG2eXoe4A&s');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #0d6efd; /* Blue top border */
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">CpE Admin Portal</h3>
            <small class="text-muted">System Administrator Access</small>
        </div>
        <form id="cpeLoginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Access System</button>
            <div class="mt-3 text-center">
                <small><a href="login.html" class="text-decoration-none text-muted">Go to Barangay Staff Login</a></small>
                <br>
                <small><a href="cpe-register.html" class="text-decoration-none text-muted">Register New Admin</a></small>
            </div>
        </form>
    </div>

    <script src="database.js"></script>
    <script>
        document.getElementById('cpeLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const result = await db.login(user, pass);

            if(result.success) {
                const validUser = result.user;
                if (validUser.role === 'cpe-admin') {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userRole', 'cpe-admin');
                    sessionStorage.setItem('currentUser', validUser.username);
                    window.location.href = 'cpe-dashboard.html';
                } else {
                    alert('Access Denied: This portal is for CpE Administrators only.');
                }
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
