<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CpE Admin Registration - System Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 100, 0.7), rgba(0, 0, 100, 0.7)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuTK34t1qtwwqcbjnlGwLFFOhunOG2eXoe4A&s');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: rgb(248, 248, 248);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(4, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #0d6efd;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">CpE Admin Registration</h3>
            <small class="text-muted">Authorized Personnel Only</small>
        </div>
        <form id="cpeRegisterForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="regUsername" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="regPassword" minlength="8" maxlength="13" required>
                <small class="text-muted">8-13 characters</small>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" maxlength="13" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Register Admin</button>
            <div class="mt-3 text-center">
                <small>Back to <a href="cpe-login.html" class="text-decoration-none">Login</a></small>
            </div>
        </form>
    </div>

    <script src="database.js"></script>
    <script>
        document.getElementById('cpeRegisterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = document.getElementById('regUsername').value;
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass.length < 8) { alert('Password must be at least 8 characters long.'); return; }
            if (pass !== confirm) { alert('Passwords do not match!'); return; }

            // Use Web Database
            const result = await db.register(user, pass, 'cpe-admin');
            
            if (result.success) {
                alert('CpE Admin Account Created! Please login.');
                window.location.href = 'cpe-login.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
